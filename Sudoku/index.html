<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sudoku</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --board-size: min(60vh, 90vw);
            --cell-size: calc(var(--board-size) / 9);
            --button-size: calc(var(--board-size) / 5);
        }

        * {
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        #gameWindow {
            height: var(--board-size);
            width: var(--board-size);
            border-radius: 5%;
            background-color: #b22222;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
        }

        .cell {
            height: var(--cell-size);
            width: var(--cell-size);
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-size: calc(var(--cell-size) * 0.5);
            box-sizing: border-box;
            border: 1px solid #444;
            border-radius: 0;
            padding: 0;
            line-height: var(--cell-size);
            text-align: center;
        }

        .cell:hover          { background-color: #2a2a4e; }
        .cellGiven           { color: #f0c040; pointer-events: none; }
        .cellHint            { color: rgb(60, 200, 60); pointer-events: none; }
        .cellConflict        { background-color: rgb(200, 60, 60) !important; color: white !important; }
        .cellHighlight       { background-color: #3a3a6e !important; }
        .border-right        { border-right: 3px solid #ccc; }
        .border-bottom       { border-bottom: 3px solid #ccc; }

        #topBar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }

        #topBar button {
            font-size: medium;
            padding: 8px 20px;
            cursor: pointer;
        }

        #timer {
            font-size: x-large;
            margin: 10px;
        }

        #numberBar {
            display: grid;
            grid-template-columns: repeat(5, var(--button-size));
            width: var(--board-size);
        }

        .button {
            height: var(--button-size);
            width: var(--button-size);
            font-size: calc(var(--button-size) * 0.4);
            box-sizing: border-box;
            cursor: pointer;
            border-radius: 0;
            border: 1px solid #555;
            background-color: #2a2a2a;
            color: #e0e0e0;
            padding: 0;
            line-height: var(--button-size);
            text-align: center;
        }

        .button:hover        { background-color: #3a3a3a; }
        .buttonSelected      { background-color: #e0e0e0 !important; color: #1a1a1a !important; }
        .buttonClear         { color: rgb(220, 80, 80); }
        .buttonClearSelected { background-color: #e0e0e0 !important; color: rgb(200, 60, 60) !important; }

        #completionOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #completionOverlay.visible { display: flex; }

        #completionBox {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
        }

        #completionBox h1     { margin-bottom: 10px; }
        #completionBox p      { font-size: large; margin-bottom: 20px; }
        #completionBox button { font-size: large; padding: 10px 30px; cursor: pointer; }
    </style>
</head>
<body>
    <center>
        <a class="simpleButton" href="../index.html">go back</a>
        <br><br>

        <div id="topBar">
            <button onclick="RevealHint()">Hint</button>
            <button onclick="RestartGame()">Restart</button>
        </div>

        <div id="timer">00:00</div>
        <div id="gameWindow"></div>

        <div id="numberBar">
            <button class="button" id="buttonSelection1" onclick="SelectNumber(1)">1</button>
            <button class="button" id="buttonSelection2" onclick="SelectNumber(2)">2</button>
            <button class="button" id="buttonSelection3" onclick="SelectNumber(3)">3</button>
            <button class="button" id="buttonSelection4" onclick="SelectNumber(4)">4</button>
            <button class="button" id="buttonSelection5" onclick="SelectNumber(5)">5</button>
            <button class="button" id="buttonSelection6" onclick="SelectNumber(6)">6</button>
            <button class="button" id="buttonSelection7" onclick="SelectNumber(7)">7</button>
            <button class="button" id="buttonSelection8" onclick="SelectNumber(8)">8</button>
            <button class="button" id="buttonSelection9" onclick="SelectNumber(9)">9</button>
            <button class="button buttonClear" id="buttonClear" onclick="SelectClear()">✕</button>
        </div>
    </center>

    <div id="completionOverlay">
        <div id="completionBox">
            <h1>Puzzle Complete!</h1>
            <p id="completionTime"></p>
            <button onclick="RestartGame()">Play Again</button>
        </div>
    </div>

    <script>
        let selectedNumber = -1;
        let cells = [];
        let solution = [];
        let startTime = null;
        let timerInterval = null;
        let conflictCells = new Set();

        CreateCells();

        function CreateCells()
        {
            let gameWindow = document.getElementById("gameWindow");
            gameWindow.innerHTML = "";
            cells = [];

            let puzzle = GeneratePuzzle();

            for (let row = 0; row < 9; row++)
            {
                cells[row] = [];

                for (let col = 0; col < 9; col++)
                {
                    let given = puzzle[row][col] !== 0;
                    let btn = document.createElement("button");

                    btn.id = "cell" + (row * 9 + col);
                    btn.innerHTML = given ? puzzle[row][col] : "";

                    let classes = "cell";
                    if (col === 2 || col === 5) classes += " border-right";
                    if (row === 2 || row === 5) classes += " border-bottom";
                    if (given) classes += " cellGiven";
                    btn.className = classes;

                    if (!given)
                    {
                        btn.addEventListener("click", (function(r, c)
                        {
                            return function() { ClickCell(r, c); };
                        })(row, col));
                    }

                    gameWindow.appendChild(btn);
                    cells[row][col] = btn;
                }
            }

            StartTimer();
        }

        function ClickCell(row, col)
        {
            if (selectedNumber === -1) return;

            if (selectedNumber === 0)
            {
                cells[row][col].innerHTML = "";
            }
            else if (GetCellValue(row, col) === selectedNumber)
            {
                cells[row][col].innerHTML = "";
            }
            else
            {
                cells[row][col].innerHTML = selectedNumber;
            }

            UpdateConflicts();
            ApplyVisualState();
            CheckCompletion();
        }

        function GetCellValue(row, col)
        {
            let text = cells[row][col].innerHTML;
            return text === "" ? 0 : parseInt(text);
        }

        function UpdateConflicts()
        {
            conflictCells.clear();

            for (let i = 0; i < 9; i++)
            {
                FindLineConflicts(i, true);
                FindLineConflicts(i, false);
            }
        }

        function FindLineConflicts(index, isRow)
        {
            let positions = {};

            for (let i = 0; i < 9; i++)
            {
                let row = isRow ? index : i;
                let col = isRow ? i : index;
                let val = GetCellValue(row, col);

                if (val > 0)
                {
                    if (!positions[val]) positions[val] = [];
                    positions[val].push(i);
                }
            }

            for (let num in positions)
            {
                if (positions[num].length < 2) continue;

                for (let i = 0; i < 9; i++)
                {
                    let row = isRow ? index : i;
                    let col = isRow ? i : index;
                    conflictCells.add(row + "," + col);
                }
            }
        }

        function ApplyVisualState()
        {
            for (let row = 0; row < 9; row++)
            {
                for (let col = 0; col < 9; col++)
                {
                    let key = row + "," + col;
                    cells[row][col].classList.remove("cellConflict", "cellHighlight");

                    if (conflictCells.has(key))
                    {
                        cells[row][col].classList.add("cellConflict");
                    }
                    else if (selectedNumber > 0 && GetCellValue(row, col) === selectedNumber)
                    {
                        cells[row][col].classList.add("cellHighlight");
                    }
                }
            }
        }

        function CheckCompletion()
        {
            for (let row = 0; row < 9; row++)
            {
                for (let col = 0; col < 9; col++)
                {
                    if (GetCellValue(row, col) === 0) return;
                    if (conflictCells.has(row + "," + col)) return;
                }
            }

            clearInterval(timerInterval);
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            ShowCompletionScreen(elapsed);
        }

        function ShowCompletionScreen(totalSeconds)
        {
            let minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
            let seconds = (totalSeconds % 60).toString().padStart(2, "0");
            document.getElementById("completionTime").textContent = "Completed in " + minutes + ":" + seconds;
            document.getElementById("completionOverlay").classList.add("visible");
        }

        function StartTimer()
        {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now();
            UpdateTimerDisplay();
            timerInterval = setInterval(UpdateTimerDisplay, 1000);
        }

        function UpdateTimerDisplay()
        {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let minutes = Math.floor(elapsed / 60).toString().padStart(2, "0");
            let seconds = (elapsed % 60).toString().padStart(2, "0");
            document.getElementById("timer").textContent = minutes + ":" + seconds;
        }

        function SelectNumber(number)
        {
            let buttonId = "buttonSelection" + number;

            if (selectedNumber === number)
            {
                selectedNumber = -1;
                document.getElementById(buttonId).className = "button";
                ApplyVisualState();
                return;
            }

            selectedNumber = number;

            for (let i = 1; i <= 9; i++)
            {
                document.getElementById("buttonSelection" + i).className = "button";
            }

            document.getElementById("buttonClear").className = "button buttonClear";
            document.getElementById(buttonId).className = "button buttonSelected";
            ApplyVisualState();
        }

        function SelectClear()
        {
            if (selectedNumber === 0)
            {
                selectedNumber = -1;
                document.getElementById("buttonClear").className = "button buttonClear";
                ApplyVisualState();
                return;
            }

            selectedNumber = 0;

            for (let i = 1; i <= 9; i++)
            {
                document.getElementById("buttonSelection" + i).className = "button";
            }

            document.getElementById("buttonClear").className = "button buttonClearSelected";
            ApplyVisualState();
        }

        function RevealHint()
        {
            let emptyCells = [];

            for (let row = 0; row < 9; row++)
            {
                for (let col = 0; col < 9; col++)
                {
                    if (GetCellValue(row, col) === 0)
                    {
                        emptyCells.push([row, col]);
                    }
                }
            }

            if (emptyCells.length === 0) return;

            let [row, col] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            cells[row][col].innerHTML = solution[row][col];
            cells[row][col].classList.add("cellHint");

            UpdateConflicts();
            ApplyVisualState();
            CheckCompletion();
        }

        function RestartGame()
        {
            document.getElementById("completionOverlay").classList.remove("visible");

            selectedNumber = -1;
            conflictCells.clear();

            for (let i = 1; i <= 9; i++)
            {
                document.getElementById("buttonSelection" + i).className = "button";
            }

            document.getElementById("buttonClear").className = "button buttonClear";

            CreateCells();
        }

        function GeneratePuzzle()
        {
            let board = Array.from({ length: 9 }, () => Array(9).fill(0));
            SolveBoard(board);

            solution = board.map(row => [...row]);

            let puzzle = board.map(row => [...row]);

            Shuffle([...Array(81).keys()])
                .slice(0, 45)
                .forEach(pos => { puzzle[Math.floor(pos / 9)][pos % 9] = 0; });

            return puzzle;
        }

        function SolveBoard(board)
        {
            for (let row = 0; row < 9; row++)
            {
                for (let col = 0; col < 9; col++)
                {
                    if (board[row][col] !== 0) continue;

                    for (let num of Shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9]))
                    {
                        if (!IsValidPlacement(board, row, col, num)) continue;

                        board[row][col] = num;
                        if (SolveBoard(board)) return true;
                        board[row][col] = 0;
                    }

                    return false;
                }
            }

            return true;
        }

        function IsValidPlacement(board, row, col, num)
        {
            for (let i = 0; i < 9; i++)
            {
                if (board[row][i] === num || board[i][col] === num) return false;
            }

            let boxRow = Math.floor(row / 3) * 3;
            let boxCol = Math.floor(col / 3) * 3;

            for (let r = boxRow; r < boxRow + 3; r++)
            {
                for (let c = boxCol; c < boxCol + 3; c++)
                {
                    if (board[r][c] === num) return false;
                }
            }

            return true;
        }

        function Shuffle(array)
        {
            for (let i = array.length - 1; i > 0; i--)
            {
                let j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }

            return array;
        }
    </script>
</body>
</html>
