<style>
    #gameWindow
    {
        height: 60vh;
        width: 60vh;
        padding: 5vh;
        border-radius: 5%;
        /*background-color: red;*/
        display: grid;       
        grid-template-columns: repeat(9, 1fr);
    }

    .cell
    {
        height: calc(60vh/9);
        width: calc(60vh/9);
        background-color: gray;
        font-size:xx-large;
    }

    .cellGiven
    {
        color: blue;
    }

    .border-right  { border-right:  3px solid black; }
    .border-bottom { border-bottom: 3px solid black; }
    .cell:hover
    {
        background-color: rgb(96, 96, 96);
    }

    .buttonSelected
    {
        background-color: rgb(33, 33, 33);
        color: rgb(200,200,200);
    }

    .button
    {
        height: calc(60vh/9);
        width: calc(60vh/9); 
        font-size:xx-large;
    }
</style>



<head>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <center>
            <a class="simpleButton" href="../index.html">go back</a>
            <br><br><br><br><br>
            <div id="gameWindow">
            
            </div>
            <button class="button" id="buttonSelection1" onclick="selectNumber(1)">1</button>
            <button class="button" id="buttonSelection2" onclick="selectNumber(2)">2</button>
            <button class="button" id="buttonSelection3" onclick="selectNumber(3)">3</button>
            <button class="button" id="buttonSelection4" onclick="selectNumber(4)">4</button>
            <button class="button" id="buttonSelection5" onclick="selectNumber(5)">5</button>
            <button class="button" id="buttonSelection6" onclick="selectNumber(6)">6</button>
            <button class="button" id="buttonSelection7" onclick="selectNumber(7)">7</button>
            <button class="button" id="buttonSelection8" onclick="selectNumber(8)">8</button>
            <button class="button" id="buttonSelection9" onclick="selectNumber(9)">9</button>
    </center>
</body>



<script>
    var selectedNumber = -1;
    var cells = [];
    var puzzle = [
        [5, 3, 0, 0, 7, 0, 0, 0, 0],
        [6, 0, 0, 1, 9, 5, 0, 0, 0],
        [0, 9, 8, 0, 0, 0, 0, 6, 0],
        [8, 0, 0, 0, 6, 0, 0, 0, 3],
        [4, 0, 0, 8, 0, 3, 0, 0, 1],
        [7, 0, 0, 0, 2, 0, 0, 0, 6],
        [0, 6, 0, 0, 0, 0, 2, 8, 0],
        [0, 0, 0, 4, 1, 9, 0, 0, 5],
        [0, 0, 0, 0, 8, 0, 0, 7, 9]
    ]

    createCells();

    function createCells() 
    {
        var gameWindow = document.getElementById("gameWindow");
        gameWindow.innerHTML = "";
        cells = [];

        for (var row = 0; row < 9; row++) {
            cells[row] = [];
            for (var col = 0; col < 9; col++) {
                var i = row * 9 + col;
                var given = puzzle[row][col] !== 0;

                var extra = "";
                if (col === 2 || col === 5) extra += " border-right";
                if (row === 2 || row === 5) extra += " border-bottom";
                if (given) extra += " cellGiven";

                var btn = document.createElement("button");
                btn.id = "cell" + i;
                btn.className = "cell" + extra;
                btn.innerHTML = given ? puzzle[row][col] : "";

                if (!given) 
                {
                    btn.onclick = (function(r, c) 
                    {
                        return function() { clickCell(r, c); };
                    })(row, col);
                }

                gameWindow.appendChild(btn);
                cells[row][col] = btn;
            }
        }
    }

    function clickCell(row, col) 
    {
        if (selectedNumber < 1 || selectedNumber > 9) {
            cells[row][col].innerHTML = "";
            return;
        }
        cells[row][col].innerHTML = selectedNumber;
    }

    function selectNumber(number) 
    {
        var buttonId = "buttonSelection" + number;
        if (selectedNumber == number) {
            selectedNumber = -1;
            document.getElementById(buttonId).className = "button";
            return;
        }

        selectedNumber = number;
        for (var i = 1; i <= 9; i++) {
            document.getElementById("buttonSelection" + i).className = "button";
        }
        document.getElementById(buttonId).className = "button buttonSelected";
    }
</script>
